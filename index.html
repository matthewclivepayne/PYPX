<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Inquiry Hub</title>
    <!-- Onest font -->
    <link href="https://fonts.cdnfonts.com/css/onest" rel="stylesheet">
    <style>
        :root {
            --color-primary: #3b82f6;
            --color-primary-hover: #2563eb;
            --color-bg: #020617;
            --color-surface: #0b1220;
            --color-text: #e5e7eb;
            --color-text-secondary: #9ca3af;
            --color-accent: #facc15;
            --color-border: rgba(148, 163, 184, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1d2a4d 0%, #020617 55%, #020617 100%);
            color: var(--color-text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        header {
            text-align: center;
            padding: 32px 20px 28px;
            background: linear-gradient(135deg, #111827 0%, #020617 60%, #1d4ed8 120%);
            border-radius: 18px;
            margin-bottom: 28px;
            border: 1px solid var(--color-border);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        }

        h1 {
            font-size: 2.4rem;
            color: var(--color-primary);
            margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 1.05rem;
            color: var(--color-text-secondary);
            max-width: 640px;
            margin: 0 auto;
        }

        .search-box {
            margin: 28px 0 22px;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            max-width: 520px;
            padding: 12px 18px;
            font-size: 0.98rem;
            border: 2px solid var(--color-border);
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.85);
            color: var(--color-text);
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s, transform 0.1s;
            backdrop-filter: blur(10px);
        }

        #searchInput::placeholder {
            color: var(--color-text-secondary);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.35);
            background: #020617;
            transform: translateY(-1px);
        }

        .passions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .passion-card {
            background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), rgba(15, 23, 42, 0.96));
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 18px 18px 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .passion-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--color-primary);
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.4);
        }

        .passion-card h3 {
            color: var(--color-text);
            font-size: 1.1rem;
        }

        .passion-card .icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .passion-card small {
            color: var(--color-text-secondary);
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(30, 64, 175, 0.5), rgba(0, 0, 0, 0.9));
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #020617;
            border: 1px solid rgba(59, 130, 246, 0.8);
            border-radius: 18px;
            max-width: 760px;
            width: 100%;
            padding: 26px 26px 24px;
            position: relative;
            margin: auto;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.95);
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 1.8rem;
            color: var(--color-text-secondary);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            color: var(--color-primary);
            transform: scale(1.08);
        }

        .modal-content h2 {
            color: var(--color-primary);
            margin-bottom: 16px;
            font-size: 1.7rem;
        }

        .modal-hint {
            font-size: 0.82rem;
            color: var(--color-text-secondary);
            margin-bottom: 10px;
        }

        .modal-content ul {
            list-style: none;
            padding: 0;
        }

        .modal-content li {
            background: linear-gradient(135deg, #020617 0%, #020617 55%, #111827 100%);
            padding: 13px 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid var(--color-accent);
            transition: all 0.2s;
            font-size: 0.96rem;
        }

        .modal-content li:hover {
            border-left-color: var(--color-primary);
            transform: translateX(4px);
            background: linear-gradient(135deg, #020617 0%, #0b1120 55%, #1d2538 100%);
        }

        .back-to-top {
            position: fixed;
            bottom: 26px;
            right: 26px;
            background: var(--color-primary);
            color: #e5e7eb;
            width: 46px;
            height: 46px;
            border-radius: 999px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.7);
            transition: all 0.25s;
        }

        .back-to-top:hover {
            background: var(--color-primary-hover);
            transform: translateY(-3px);
        }

        .back-to-top.visible {
            display: flex;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            header {
                padding: 24px 18px 22px;
            }

            .passions-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 22px 18px 20px;
            }

            .modal-content h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 PYPX 2026</h1>
            <p class="subtitle">This website will help you find an issue which links to your passion.</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔎 Type to search...">
        </div>

        <div class="passions-grid" id="passionsGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
            <h2 id="modalTitle"></h2>
            <p class="modal-hint">Use one of these to help you write an inquiry question.</p>
            <ul id="modalList"></ul>
        </div>
    </div>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

                        {

        const passionsGrid = document.getElementById('passionsGrid');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalList = document.getElementById('modalList');
        const closeBtn = document.getElementById('closeBtn');
        const searchInput = document.getElementById('searchInput');
        const backToTop = document.getElementById('backToTop');

        function renderPassions(filteredPassions) {
            passionsGrid.innerHTML = '';
            filteredPassions.forEach(passion => {
                const card = document.createElement('div');
                card.className = 'passion-card';
                card.innerHTML = `
                    <div class="icon">${passion.icon}</div>
                    <h3>${passion.name}</h3>
                    <small>Click to see possible inquiry issues</small>
                `;
                card.addEventListener('click', () => showModal(passion));
                passionsGrid.appendChild(card);
            });
        }

        function showModal(passion) {
            modalTitle.textContent = `${passion.icon} ${passion.name}`;
            modalList.innerHTML = '';
            passion.issues.forEach(issue => {
                const li = document.createElement('li');
                li.textContent = issue;
                modalList.appendChild(li);
            });
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = passions.filter(passion =>
                passion.name.toLowerCase().includes(searchTerm)
            );
            renderPassions(filtered);
        });

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        renderPassions(passions);
    </script>
</body>
</html>
